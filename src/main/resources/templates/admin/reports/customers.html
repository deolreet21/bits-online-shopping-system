<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Customer Activity — e-Kiosk Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🛒 e-Kiosk Admin</span>
    <div class="d-flex gap-3 align-items-center">
        <a href="/admin/dashboard" class="text-white text-decoration-none">Dashboard</a>
        <a href="/admin/products"  class="text-white text-decoration-none">Products</a>
        <span class="text-white-50" th:text="${loggedInUser?.username}"></span>
        <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
</nav>

<div class="container py-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="/admin/reports">Reports</a></li>
            <li class="breadcrumb-item active">Customer Activity</li>
        </ol>
    </nav>

    <h4 class="mb-4 fw-bold">👥 Customer Activity Report</h4>

    <!-- Summary -->
    <div class="mb-3 text-muted">
        <span class="fw-semibold" th:text="${summaries.size()}">0</span> registered customers
    </div>

    <div class="card shadow-sm">
        <div class="card-header fw-semibold">All Customers</div>
        <div th:if="${summaries.isEmpty()}" class="p-4 text-center text-muted">
            No customers registered yet.
        </div>
        <div class="table-responsive" th:if="${!summaries.isEmpty()}">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Joined</th>
                        <th class="text-center">Orders</th>
                        <th class="text-center">Activity</th>
                    </tr>
                </thead>
                <tbody>
                    <!--
                        CustomerSummary is a Java record — Spring 6 BeanWrapper exposes record
                        components as read-only properties, so standard property access works:
                        summary.user calls user(), summary.orderCount calls orderCount()
                    -->
                    <tr th:each="summary, stat : ${summaries}">
                        <td th:text="${stat.count}"></td>
                        <td class="fw-semibold" th:text="${summary.user.username}"></td>
                        <td th:text="${summary.user.email}"></td>
                        <td th:text="${#temporals.format(summary.user.createdDate, 'dd MMM yyyy')}"></td>
                        <td class="text-center">
                            <span class="badge bg-primary rounded-pill"
                                  th:text="${summary.orderCount}">0</span>
                        </td>
                        <td class="text-center">
                            <span th:if="${summary.orderCount == 0}"
                                  class="badge bg-secondary">No Orders</span>
                            <span th:if="${summary.orderCount > 0 and summary.orderCount < 3}"
                                  class="badge bg-info text-dark">New</span>
                            <span th:if="${summary.orderCount >= 3}"
                                  class="badge bg-success">Active</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
