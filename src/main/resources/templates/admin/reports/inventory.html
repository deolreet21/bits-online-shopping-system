<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Inventory Report — e-Kiosk Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🛒 e-Kiosk Admin</span>
    <div class="d-flex gap-3 align-items-center">
        <a href="/admin/dashboard" class="text-white text-decoration-none">Dashboard</a>
        <a href="/admin/products"  class="text-white text-decoration-none">Products</a>
        <span class="text-white-50" th:text="${loggedInUser?.username}"></span>
        <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
</nav>

<div class="container py-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="/admin/reports">Reports</a></li>
            <li class="breadcrumb-item active">Inventory</li>
        </ol>
    </nav>

    <h4 class="mb-4 fw-bold">📦 Inventory Report</h4>

    <!-- Total product count -->
    <div class="mb-4">
        <span class="badge bg-secondary fs-6 px-3 py-2">
            Total Products: <span th:text="${products.size()}">0</span>
        </span>
    </div>

    <div class="card shadow-sm">
        <div class="card-header fw-semibold">All Products</div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th class="text-end">Price (₹)</th>
                        <th class="text-center">Qty on Hand</th>
                        <th class="text-center">Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.name}" class="fw-semibold"></td>
                        <td th:text="${p.category.displayName}"></td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(p.price, 1, 2)}"></td>
                        <td class="text-center fw-bold" th:text="${p.quantityOnHand}"></td>
                        <td class="text-center">
                            <!--
                                Chained th:if blocks work like if/else-if here because the conditions are
                                mutually exclusive — only the first matching block renders for each row.
                            -->
                            <span th:if="${p.quantityOnHand == 0}"
                                  class="badge bg-danger">Out of Stock</span>
                            <span th:if="${p.quantityOnHand > 0 and p.quantityOnHand < 5}"
                                  class="badge bg-warning text-dark">Low Stock</span>
                            <span th:if="${p.quantityOnHand >= 5}"
                                  class="badge bg-success">In Stock</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                               class="btn btn-sm btn-outline-primary">Edit</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
